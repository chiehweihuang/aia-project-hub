<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCAG 2.2 AA 測試流程 — AIA 網站</title>
<style>
  :root {
    --primary: #1a365d;
    --secondary: #2b6cb0;
    --accent: #ed8936;
    --success: #38a169;
    --warning: #d69e2e;
    --danger: #e53e3e;
    --bg: #f7fafc;
    --card: #ffffff;
    --text: #2d3748;
    --muted: #718096;
    --border: #e2e8f0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); line-height:1.7; }

  .topnav { position:sticky; top:0; z-index:100; background: var(--success); padding:12px 24px; display:flex; gap:12px; align-items:center; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .topnav h1 { color:#fff; font-size:16px; margin-right:auto; }
  .topnav select { padding:6px 12px; border-radius:6px; border:none; font-size:14px; }
  .topnav a { color:#fff; text-decoration:none; font-size:13px; opacity:.8; }
  .topnav a:hover { opacity:1; }

  .container { max-width:900px; margin:0 auto; padding:24px 20px 80px; }

  .progress-bar { background:#e2e8f0; border-radius:8px; height:8px; margin-bottom:24px; overflow:hidden; }
  .progress-fill { height:100%; background: linear-gradient(90deg, var(--secondary), var(--success)); border-radius:8px; transition:width .4s; }
  .progress-label { font-size:13px; color: var(--muted); margin-bottom:8px; display:flex; justify-content:space-between; }

  .step { background: var(--card); border-radius:12px; margin-bottom:16px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); border-left:4px solid var(--border); transition:.2s; }
  .step.active { border-left-color: var(--secondary); box-shadow:0 2px 12px rgba(0,0,0,.12); }
  .step.done { border-left-color: var(--success); opacity:.7; }
  .step.done .step-header { background:#f0fff4; }

  .step-header { padding:16px 20px; cursor:pointer; display:flex; align-items:center; gap:12px; }
  .step-header:hover { background:#f7fafc; }
  .step-num { width:32px; height:32px; border-radius:50%; background: var(--border); color: var(--muted); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
  .step.active .step-num { background: var(--secondary); color:#fff; }
  .step.done .step-num { background: var(--success); color:#fff; }
  .step-title { font-size:15px; font-weight:600; flex:1; }
  .step-time { font-size:12px; color: var(--muted); white-space:nowrap; }
  .step-type { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .type-auto { background:#dbeafe; color:#1e40af; }
  .type-manual { background:#fef3c7; color:#92400e; }
  .type-sr { background:#ede9fe; color:#5b21b6; }

  .step-body { display:none; padding:0 20px 20px; }
  .step.active .step-body { display:block; }
  .step-body h4 { font-size:14px; color: var(--secondary); margin:12px 0 6px; }
  .step-body ul { padding-left:20px; font-size:14px; }
  .step-body li { margin-bottom:6px; }
  .step-body code { background:#edf2f7; padding:1px 6px; border-radius:3px; font-size:13px; }

  .tool-badge { display:inline-block; background:#e9d8fd; color:#553c9a; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:500; margin:2px; }
  .tip-box { background:#fffff0; border:1px solid #ecc94b; border-radius:8px; padding:12px 16px; margin:8px 0; font-size:13px; }
  .warn-box { background:#fff5f5; border:1px solid #feb2b2; border-radius:8px; padding:12px 16px; margin:8px 0; font-size:13px; color:#c53030; }

  .result-area { margin-top:12px; }
  .result-area label { font-size:13px; font-weight:600; display:block; margin-bottom:4px; }
  .result-area textarea { width:100%; border:1px solid var(--border); border-radius:8px; padding:10px; font-family:inherit; font-size:13px; min-height:80px; resize:vertical; }
  .result-area textarea:focus { outline:none; border-color: var(--secondary); }

  .btn-row { display:flex; gap:8px; margin-top:12px; }
  .btn { padding:8px 20px; border:none; border-radius:6px; font-size:14px; cursor:pointer; font-weight:600; transition:.2s; }
  .btn-pass { background: var(--success); color:#fff; }
  .btn-fail { background: var(--danger); color:#fff; }
  .btn-na { background: var(--border); color: var(--muted); }
  .btn:hover { opacity:.85; transform:translateY(-1px); }

  .summary { background: var(--card); border-radius:12px; padding:24px; box-shadow:0 2px 8px rgba(0,0,0,.1); display:none; }
  .summary.visible { display:block; }
  .summary h2 { margin-bottom:16px; color: var(--primary); }
  .summary-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; margin-bottom:20px; }
  .summary-stat { text-align:center; padding:16px; border-radius:8px; }
  .summary-stat .num { font-size:32px; font-weight:700; }
  .summary-stat .label { font-size:13px; color: var(--muted); }
  .stat-pass { background:#f0fff4; color: var(--success); }
  .stat-fail { background:#fff5f5; color: var(--danger); }
  .stat-na { background:#f7fafc; color: var(--muted); }
  .issue-list { font-size:14px; }
  .issue-item { padding:10px 12px; border-bottom:1px solid var(--border); }
  .issue-item:last-child { border:none; }
  .btn-export { background: var(--primary); color:#fff; padding:10px 24px; border:none; border-radius:6px; font-size:14px; cursor:pointer; margin-top:12px; }

  @media (max-width:768px) {
    .topnav { flex-wrap:wrap; padding:8px 12px; }
    .container { padding:12px; }
    .summary-grid { grid-template-columns:1fr; }
  }
  @media print {
    .topnav { position:static; }
    .step { break-inside:avoid; }
    .step-body { display:block !important; }
    .btn-row, .result-area textarea, .topnav select, .topnav a { display:none; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <h1>WCAG 2.2 AA 測試流程</h1>
  <select id="page-select" onchange="selectPage(this.value)">
    <option value="home">測試頁面：Home 首頁</option>
    <option value="events">測試頁面：Events 活動頁</option>
  </select>
  <a href="../index.html">返回專案總覽</a>
</nav>

<div class="container">
  <div class="progress-label">
    <span id="progress-text">Step 0 / 0</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <div id="steps-container"></div>

  <div class="summary" id="summary">
    <h2>測試報告</h2>
    <div class="summary-grid">
      <div class="summary-stat stat-pass"><div class="num" id="sum-pass">0</div><div class="label">Pass</div></div>
      <div class="summary-stat stat-fail"><div class="num" id="sum-fail">0</div><div class="label">Fail</div></div>
      <div class="summary-stat stat-na"><div class="num" id="sum-na">0</div><div class="label">N/A</div></div>
    </div>
    <h3 style="margin-bottom:8px;">Issues Found</h3>
    <div class="issue-list" id="issue-list"></div>
    <button class="btn-export" onclick="exportReport()">Export Markdown Report</button>
  </div>
</div>

<script>
const STEPS = [
  { id:'auto-scan', title:'Step 1：自動化掃描', time:'~5 min', type:'auto' },
  { id:'page-title', title:'Step 2：頁面標題', time:'~1 min', type:'manual' },
  { id:'headings', title:'Step 3：標題結構', time:'~3 min', type:'manual' },
  { id:'images', title:'Step 4：圖片替代文字', time:'~5 min', type:'manual' },
  { id:'contrast', title:'Step 5：色彩對比度', time:'~5 min', type:'manual' },
  { id:'keyboard', title:'Step 6：鍵盤導覽', time:'~8 min', type:'manual' },
  { id:'links', title:'Step 7：連結文字', time:'~3 min', type:'manual' },
  { id:'language', title:'Step 8：語言設定', time:'~2 min', type:'manual' },
  { id:'landmarks', title:'Step 9：頁面地標', time:'~3 min', type:'manual' },
  { id:'forms', title:'Step 10：表單', time:'~5 min', type:'manual' },
  { id:'screen-reader', title:'Step 11：螢幕閱讀器測試', time:'~10 min', type:'sr' },
  { id:'resize', title:'Step 12：文字放大與響應式', time:'~3 min', type:'manual' },
  { id:'multimedia', title:'Step 13：多媒體', time:'~3 min', type:'manual' },
  { id:'target-size', title:'Step 14：觸控目標大小（WCAG 2.2）', time:'~2 min', type:'manual' },
  { id:'drag', title:'Step 15：拖曳替代（WCAG 2.2）', time:'~1 min', type:'manual' }
];

const STEP_CONTENT = {
  'auto-scan': '<h4>做什麼</h4><p>用自動化工具先掃一輪，抓出機器能檢測到的問題（約佔 WCAG 項目的 30-40%）。</p><h4>操作步驟</h4><ul><li>在 Chrome 開啟要測試的頁面</li><li>按 <code>F12</code> 打開 DevTools</li><li><strong>axe DevTools：</strong>切到 axe 分頁 → Scan All of My Page → 等待結果</li><li><strong>Lighthouse：</strong>切到 Lighthouse 分頁 → 只勾 Accessibility → Analyze → 記錄分數</li><li>如果裝了 WAVE：點擊 WAVE 擴充圖示 → 截圖 errors 和 alerts</li></ul><div class="tip-box">axe 和 Lighthouse 的結果有重疊但也互補。axe 更精確，Lighthouse 會給整體分數。兩個都跑。</div><h4>工具</h4><span class="tool-badge">axe DevTools</span><span class="tool-badge">Lighthouse</span><span class="tool-badge">WAVE (optional)</span>',
  'page-title': '<h4>檢查什麼</h4><p>瀏覽器分頁上的標題是否有意義、能區分不同頁面。</p><h4>操作步驟</h4><ul><li>看瀏覽器分頁上的文字</li><li>確認不是「Untitled」或所有頁面都叫「AIA」</li><li>建議格式：「活動 — APAC AIA」或「APAC AIA | 首頁」</li></ul><div class="tip-box">自動掃描通常已經檢查了這項。如果 axe 沒報錯，快速確認即可。</div>',
  'headings': '<h4>檢查什麼</h4><p>H1-H6 標題層級是否正確、不跳級。每頁只有一個 H1。</p><h4>操作步驟</h4><ul><li>安裝 <strong>HeadingsMap</strong> Chrome 擴充</li><li>點擊 HeadingsMap 圖示 → 查看標題樹狀結構</li><li>確認：只有一個 H1，層級遞進（H1→H2→H3），不跳級</li><li>如果看到 H1 直接跳到 H3 → 記錄為 issue</li></ul><div class="warn-box">常見問題：Elementor 中為了視覺效果選錯標題層級。字體大小應該用 Style 調，不是改 H tag。</div><h4>工具</h4><span class="tool-badge">HeadingsMap</span>',
  'images': '<h4>檢查什麼</h4><p>有意義的圖片有 alt text，裝飾性圖片 alt 留空。</p><h4>操作步驟</h4><ul><li>axe/WAVE 通常會列出缺少 alt 的圖片 → 先看自動掃描結果</li><li>對每張有意義的圖片：右鍵 → Inspect → 看 <code>alt</code> 屬性</li><li>確認 alt 描述了圖片的<strong>意義</strong>（不是檔名如 IMG_0234.jpg）</li><li>裝飾性圖片（純裝飾背景）：<code>alt=""</code> 留空</li><li>可點擊的圖片（如 logo 連結）：alt 描述<strong>動作</strong>（如「返回首頁」）</li></ul><div class="warn-box">跨專案經驗：Footer 贊助商 Logo 被設成空 alt，螢幕閱讀器跳過。但它有意義 → 需要 alt。</div>',
  'contrast': '<h4>檢查什麼</h4><p>文字 vs 背景對比 &gt;= 4.5:1（一般文字）或 &gt;= 3:1（大文字 18pt+）。</p><h4>操作步驟</h4><ul><li>axe/Lighthouse 通常已列出對比度不足的元素 → 先看自動掃描</li><li>開啟 <strong>Colour Contrast Analyser (CCA)</strong></li><li>用滴管工具取文字色和背景色 → 看是否通過</li><li>特別注意：Banner 上的文字、淺色按鈕文字、placeholder 文字</li><li>hover 和 focus 狀態的文字也要測</li></ul><h4>非文字對比</h4><ul><li>按鈕邊框、icon、input 邊框 vs 背景 &gt;= 3:1</li><li>Focus indicator 的對比度</li></ul><h4>工具</h4><span class="tool-badge">CCA</span><span class="tool-badge">axe DevTools</span>',
  'keyboard': '<h4>檢查什麼</h4><p>所有互動元素都能用 Tab 到達、操作、且不會卡住。</p><h4>操作步驟</h4><ul><li>把滑鼠移開螢幕</li><li>從網址列按 <code>Tab</code> 開始</li><li>一路 Tab 到頁面底部，確認：<ul><li>每個連結、按鈕、輸入框都能 Tab 到</li><li>Tab 順序跟視覺順序一致（左到右、上到下）</li><li>每個元素獲得焦點時有<strong>可見的 focus indicator</strong></li><li>不會被 sticky header 或 cookie banner <strong>完全遮住</strong></li></ul></li><li>如有下拉選單：<code>Enter</code> 展開、<code>Esc</code> 關閉</li><li>如有 Carousel/Slider：能否用鍵盤切換</li><li>如有 Popup/Modal：焦點是否移入？<code>Esc</code> 能否關閉？</li></ul><div class="warn-box">這是最重要的手動測試。自動工具無法完整檢測鍵盤問題。至少花 5 分鐘認真 Tab 一輪。</div>',
  'links': '<h4>檢查什麼</h4><p>連結文字在脫離上下文時仍有意義。不能只靠顏色區分連結。</p><h4>操作步驟</h4><ul><li>掃一眼所有連結文字 → 有沒有「按此」「了解更多」「更多」？</li><li>連結是否有底線或其他非顏色的視覺提示？</li><li>新窗口開啟的連結有沒有提示？</li></ul>',
  'language': '<h4>檢查什麼</h4><p>頁面宣告正確的主要語言，英文段落有 lang="en" 標記。</p><h4>操作步驟</h4><ul><li>右鍵 → View Page Source → 搜尋 <code>lang=</code></li><li>確認 <code>&lt;html lang="zh-Hant"&gt;</code> 或 <code>zh-TW</code></li><li>如果頁面有整段英文：檢查該區塊是否有 <code>lang="en"</code></li></ul>',
  'landmarks': '<h4>檢查什麼</h4><p>頁面有 header / nav / main / footer 地標。有 Skip to Content 連結。</p><h4>操作步驟</h4><ul><li>安裝 <strong>Landmarks</strong> Chrome 擴充 → 點擊圖示查看地標</li><li>確認有：header, nav, main, footer（至少 main 要有）</li><li>按 Tab → 第一個可聚焦元素應該是「Skip to Content」連結</li><li>Home 和 Events 之間比對：幫助功能的位置是否一致</li></ul><h4>工具</h4><span class="tool-badge">Landmarks 擴充</span>',
  'forms': '<h4>檢查什麼</h4><p>每個欄位有 label，錯誤訊息清楚，能用鍵盤完整操作。</p><h4>操作步驟</h4><ul><li>如果頁面沒有表單 → 標記 N/A</li><li>點擊 label 文字 → 對應的 input 是否獲得焦點？</li><li>故意送出空白表單 → 錯誤訊息是否指出哪個欄位有問題？</li><li>故意輸入錯誤格式 → 有沒有修正建議？</li><li>用 Tab 完成整個表單流程</li><li>必填欄位不能只靠紅色星號 → 需有文字說明</li></ul>',
  'screen-reader': '<h4>檢查什麼</h4><p>用螢幕閱讀器從頭到尾「聽」一遍頁面。</p><h4>準備</h4><ul><li><strong>Mac：</strong>按 <code>Cmd + F5</code> 開啟 VoiceOver</li><li><strong>Windows：</strong>下載 NVDA（免費）→ <code>Ctrl + Alt + N</code> 開啟</li></ul><h4>測試流程</h4><ul><li>頁面載入 → 聽朗讀的頁面標題是否正確</li><li>用 <code>H</code> 鍵跳轉標題 → 順序是否合理？</li><li>用 <code>Tab</code> 跳轉互動元素 → 朗讀內容有意義嗎？</li><li>圖片 → 有聽到替代文字嗎？裝飾性的有被跳過嗎？</li><li>連結 → 用 Links 清單聽所有連結，能單獨理解嗎？</li><li>整體感受：閉著眼睛你知道自己在哪裡嗎？</li></ul><div class="tip-box">不需要精通螢幕閱讀器。開著聽 5-10 分鐘就能發現大部分問題。</div>',
  'resize': '<h4>檢查什麼</h4><p>放大到 200% 內容不破版。320px 寬度無水平捲軸。</p><h4>操作步驟</h4><ul><li><code>Ctrl/Cmd + +</code> 放大到 200% → 文字是否可見、不重疊？</li><li>DevTools → Toggle Device Toolbar → 設寬度 320px → 有沒有水平捲軸？</li><li>手機模式下所有內容是否正常顯示？</li></ul>',
  'multimedia': '<h4>檢查什麼</h4><p>影片有字幕、音訊有文字稿、不自動播放。</p><h4>操作步驟</h4><ul><li>如果頁面沒有影片/音訊 → 標記 N/A</li><li>YouTube 嵌入影片：CC 字幕有打開嗎？</li><li>影片播放器能用鍵盤操作嗎？</li><li>有沒有一進頁面就自動播放的媒體？</li></ul>',
  'target-size': '<h4>檢查什麼</h4><p>可點擊元素至少 24x24 CSS px，或與相鄰目標有足夠間距。</p><h4>操作步驟</h4><ul><li>DevTools → Inspect 按鈕和連結 → 查看實際大小（含 padding）</li><li>特別注意：nav 連結、社群 icon、小按鈕</li><li>行內連結（文字中的連結）不受此規則限制</li></ul>',
  'drag': '<h4>檢查什麼</h4><p>拖曳操作有非拖曳的替代方式。</p><h4>操作步驟</h4><ul><li>如果沒有 Carousel / Slider / 拖曳功能 → 標記 N/A</li><li>如果有 Carousel：有沒有上一張/下一張的按鈕？</li></ul>'
};

let currentStep = 0;
let results = {};
let currentPage = 'home';

function selectPage(page) {
  currentPage = page;
  results = {};
  const saved = localStorage.getItem('wcag-test-' + page);
  if (saved) {
    try { results = JSON.parse(saved); } catch(e) { results = {}; }
  }
  render();
}

function render() {
  const container = document.getElementById('steps-container');
  // Clear existing content safely
  while (container.firstChild) container.removeChild(container.firstChild);

  STEPS.forEach(function(step, i) {
    const r = results[step.id] || {};
    const isDone = !!r.status;
    const isActive = i === currentStep;

    const div = document.createElement('div');
    div.className = 'step' + (isActive ? ' active' : '') + (isDone ? ' done' : '');

    // Header
    const header = document.createElement('div');
    header.className = 'step-header';
    header.onclick = function() { goToStep(i); };

    const num = document.createElement('div');
    num.className = 'step-num';
    num.textContent = isDone ? '\u2713' : (i + 1);

    const title = document.createElement('div');
    title.className = 'step-title';
    title.textContent = step.title;

    const typeBadge = document.createElement('span');
    typeBadge.className = 'step-type type-' + step.type;
    typeBadge.textContent = step.type === 'auto' ? 'Auto' : step.type === 'sr' ? 'Screen Reader' : 'Manual';

    const time = document.createElement('span');
    time.className = 'step-time';
    time.textContent = step.time;

    header.appendChild(num);
    header.appendChild(title);
    header.appendChild(typeBadge);
    header.appendChild(time);

    // Body (static trusted content from STEP_CONTENT)
    const body = document.createElement('div');
    body.className = 'step-body';

    const contentHtml = STEP_CONTENT[step.id] || '';
    const contentDiv = document.createElement('div');
    contentDiv.innerHTML = contentHtml; // Safe: content is hardcoded, not user input
    body.appendChild(contentDiv);

    // Result area
    const resultArea = document.createElement('div');
    resultArea.className = 'result-area';

    const label1 = document.createElement('label');
    label1.textContent = '結果判定';
    resultArea.appendChild(label1);

    const btnRow = document.createElement('div');
    btnRow.className = 'btn-row';

    ['pass', 'fail', 'na'].forEach(function(status) {
      const btn = document.createElement('button');
      btn.className = 'btn btn-' + status;
      btn.textContent = status === 'pass' ? 'Pass' : status === 'fail' ? 'Fail' : 'N/A';
      btn.onclick = function() { setResult(step.id, status, i); };
      btnRow.appendChild(btn);
    });
    resultArea.appendChild(btnRow);

    const label2 = document.createElement('label');
    label2.textContent = '備註 / 問題描述';
    label2.style.marginTop = '12px';
    resultArea.appendChild(label2);

    const textarea = document.createElement('textarea');
    textarea.placeholder = '貼上掃描結果、截圖描述、問題細節...';
    textarea.value = r.note || '';
    textarea.oninput = function() { saveNote(step.id, this.value); };
    resultArea.appendChild(textarea);

    body.appendChild(resultArea);
    div.appendChild(header);
    div.appendChild(body);
    container.appendChild(div);
  });

  updateProgress();
  updateSummary();
}

function goToStep(i) {
  currentStep = i;
  render();
}

function setResult(stepId, status, idx) {
  if (!results[stepId]) results[stepId] = {};
  results[stepId].status = status;
  save();
  currentStep = Math.min(idx + 1, STEPS.length - 1);
  if (idx === STEPS.length - 1) {
    document.getElementById('summary').classList.add('visible');
  }
  render();
}

function saveNote(stepId, note) {
  if (!results[stepId]) results[stepId] = {};
  results[stepId].note = note;
  save();
}

function save() {
  localStorage.setItem('wcag-test-' + currentPage, JSON.stringify(results));
}

function updateProgress() {
  const done = Object.values(results).filter(function(r) { return r.status; }).length;
  const total = STEPS.length;
  const pct = Math.round(done / total * 100);
  document.getElementById('progress-text').textContent = 'Step ' + done + ' / ' + total;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function updateSummary() {
  const vals = Object.values(results);
  const pass = vals.filter(function(r) { return r.status === 'pass'; }).length;
  const fail = vals.filter(function(r) { return r.status === 'fail'; }).length;
  const na = vals.filter(function(r) { return r.status === 'na'; }).length;
  document.getElementById('sum-pass').textContent = pass;
  document.getElementById('sum-fail').textContent = fail;
  document.getElementById('sum-na').textContent = na;

  const issueList = document.getElementById('issue-list');
  while (issueList.firstChild) issueList.removeChild(issueList.firstChild);

  const issues = STEPS.filter(function(s) { return results[s.id] && results[s.id].status === 'fail'; });
  if (issues.length === 0) {
    const p = document.createElement('p');
    p.style.cssText = 'color:var(--muted); padding:8px;';
    p.textContent = 'No issues found yet.';
    issueList.appendChild(p);
  } else {
    issues.forEach(function(s) {
      const note = results[s.id].note || '(no description)';
      const item = document.createElement('div');
      item.className = 'issue-item';
      const stepSpan = document.createElement('strong');
      stepSpan.textContent = s.title;
      const noteSpan = document.createElement('span');
      noteSpan.style.cssText = 'color:var(--muted); font-size:13px; display:block; margin-top:4px;';
      noteSpan.textContent = note;
      item.appendChild(stepSpan);
      item.appendChild(noteSpan);
      issueList.appendChild(item);
    });
  }

  if (Object.keys(results).length === STEPS.length) {
    document.getElementById('summary').classList.add('visible');
  }
}

function exportReport() {
  const pageName = currentPage === 'home' ? 'Home 首頁' : 'Events 活動頁';
  const date = new Date().toISOString().split('T')[0];
  var md = '# WCAG 2.2 AA Test Report\n\n';
  md += '- **Page:** ' + pageName + '\n';
  md += '- **Date:** ' + date + '\n';
  md += '- **Tester:** \n\n';

  var vals = Object.values(results);
  var pass = vals.filter(function(r) { return r.status === 'pass'; }).length;
  var fail = vals.filter(function(r) { return r.status === 'fail'; }).length;
  var na = vals.filter(function(r) { return r.status === 'na'; }).length;
  md += '## Summary\n\n| Pass | Fail | N/A |\n|------|------|-----|\n| ' + pass + ' | ' + fail + ' | ' + na + ' |\n\n';
  md += '## Results\n\n';

  STEPS.forEach(function(s) {
    var r = results[s.id] || {};
    var status = r.status ? r.status.toUpperCase() : 'NOT TESTED';
    md += '### ' + s.title + '\n\n';
    md += '**Result:** ' + status + '\n\n';
    if (r.note) md += '**Notes:** ' + r.note + '\n\n';
    md += '---\n\n';
  });

  var blob = new Blob([md], { type: 'text/markdown' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'wcag-test-' + currentPage + '-' + date + '.md';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Init
selectPage('home');
</script>
